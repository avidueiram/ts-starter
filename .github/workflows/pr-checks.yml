name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  bun-commands:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun i

      - name: Build local
        run: bun run build:local
