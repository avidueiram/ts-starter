version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    target-branch: master
    allow:
      - dependency-type: all
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
      vitest:
        patterns:
          - "@vitest/*"
          - "vitest"
      pg:
        patterns:
          - "@types/pg"
          - "pg"
      all-dependencies:
        patterns:
          - "*"
